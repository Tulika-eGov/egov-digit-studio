server {
    listen 8080;

    # Inject identity = mobileNumber when missing, so egov-otp:master-1e8d2bb
    # works with user-otp:sandbox-log-86902f9 which doesn't send identity.
    location = /otp/v1/_create {
        rewrite_by_lua_block {
            local cjson = require "cjson.safe"
            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if not body or body == "" then return end

            local data = cjson.decode(body)
            if not data or type(data.otp) ~= "table" then return end

            local otp = data.otp
            if type(otp.identity) ~= "string" or otp.identity == "" then
                otp.identity = otp.mobileNumber
                local new_body = cjson.encode(data)
                ngx.req.set_body_data(new_body)
                ngx.req.set_header("Content-Length", tostring(#new_body))
            end
        }
        proxy_pass http://egov-otp-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://egov-otp-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
